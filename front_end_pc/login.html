<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Meiduo Mall - Login</title>
    <link rel="stylesheet" type="text/css" href="css/reset.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <script type="text/javascript" src="js/host.js"></script>
    <script type="text/javascript" src="js/vue-2.5.16.js"></script>
    <script type="text/javascript" src="js/axios-0.18.0.min.js"></script>
</head>
<body>
    <div class="login_top clearfix">
        <a href="index.html" class="login_logo"><img src="images/logo02.png"></a>
    </div>
    <div class="login_form_bg" id='app'>
        <div class="login_form_wrap clearfix">
            <div class="login_banner fl"></div>
            <div class="slogan fl">Welcome!</div>
            <div class="login_form fr">
                <div class="login_title clearfix">
                    <a href="javascript:;" class="cur">Login</a>
                </div>
                <div class="form_con">
                    <div class="form_input cur">
                     
                        <form id="login-form" @submit.prevent="on_submit">
                            <input type="text" v-model="username" @blur="check_username" name="" class="name_input" placeholder="Please enter a username or mobile phone number.">
                            <div v-show="error_username" class="user_error" v-cloak>Please enter a username or mobile phone number.</div>
                            <input type="password" v-model="password" @blur="check_pwd" name="pwd" class="pass_input" placeholder="Please enter your password.">
                            <div v-show="error_pwd" class="pwd_error" v-cloak>{{ error_pwd_message }}</div>
                            <div class="more_input clearfix">
                                <input type="checkbox" v-model="remember">
                                <label>Remember Me</label>
                                <a href="/find_password.html">Forgot Password?</a>
                            </div>
                            <input type="submit" name="" value="Login" class="input_submit">
                        </form>
                    </div>
                </div>
                <div class="third_party">
                    <a @click="qq_login" class="qq_login">QQ</a>
                    <a href="#" class="weixin_login">WeChat</a>
                    <a href="/register.html" class="register_btn">Register</a>
                </div>

            </div>
        </div>
    </div>

    <div class="footer no-mp">
        <div class="foot_link">
            <a href="#">About Us</a>
            <span>|</span>
            <a href="#">Contact Us</a>
            <span>|</span>
            <a href="#">Careers</a>
            <span>|</span>
            <a href="#">Links</a>
        </div>
        <p>Copyright © 2016 Beijing Meiduo Commerce Co., Ltd. All Rights Reserved</p>
        <p>Phone: 010-****888    Beijing ICP License No. *******8</p>
    </div>
    <script type="text/javascript" src="js/login.js"></script>
</body>
</html>
