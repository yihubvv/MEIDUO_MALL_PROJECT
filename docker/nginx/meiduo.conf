upstream meiduo_app {
    server web:8000;
}

server {
    listen 80;
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/nginx/ssl/meiduo.crt;
    ssl_certificate_key /etc/nginx/ssl/meiduo.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;
    root /app/front_end_pc;

    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    location = /index/ {
        try_files /index.html =404;
    }

    location /static/ {
        alias /app/front_end_pc/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~ ^/group1/M00/(.*)$ {
        try_files /data/$1 @fastdfs;
    }

    location @fastdfs {
        proxy_pass http://storage:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @app {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://meiduo_app;
        proxy_redirect off;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ @app;
    }

    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
}
