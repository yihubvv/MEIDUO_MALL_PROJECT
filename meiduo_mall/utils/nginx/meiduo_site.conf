# NGINX config for MeiDuo Mall — HTTPS reverse proxy to Django
# Drop this file in /etc/nginx/sites-available/meiduo_site.conf and enable it.

upstream meiduo_app {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name meiduo.site www.meiduo.site localhost 127.0.0.1;
    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen 8080 ssl; # accept HTTPS on 8080 as requested
    server_name meiduo.site www.meiduo.site localhost 127.0.0.1;

    # Update these paths to your certificate files
    ssl_certificate /etc/ssl/certs/meiduo.crt;
    ssl_certificate_key /etc/ssl/private/meiduo.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Limits
    client_max_body_size 20M;

    # Serve SPA / static index from front_end_pc
    root /home/ccy/MEIDUO_MALL_PROJECT/front_end_pc;

    # Explicitly serve index.html at root
    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files /index.html =404;
    }

    # Serve /index/ (trailing slash) explicitly
    location = /index/ {
        try_files /index.html =404;
    }

    # Static files
    location /static/ {
        alias /home/ccy/MEIDUO_MALL_PROJECT/front_end_pc/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Fallback to the Django app for API and other routes
    location @app {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://meiduo_app;
        proxy_redirect off;
        proxy_buffering off;
    }

    # Proxy all other requests to app (unless matched above)
    location / {
        try_files $uri $uri/ @app;
    }

    # Optional: increase timeouts for long requests
    proxy_connect_timeout 60s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;
}
