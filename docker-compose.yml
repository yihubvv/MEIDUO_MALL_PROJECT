services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: meiduo_mall
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/meiduo_mall_current.sql:/docker-entrypoint-initdb.d/01_meiduo_mall_current.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pmysql"]
      interval: 5s
      timeout: 3s
      retries: 40

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 40

  elasticsearch:
    image: delron/elasticsearch-ik:2.4.6-1.0
    environment:
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  tracker:
    image: delron/fastdfs
    command: tracker
    volumes:
      - fdfs_tracker:/var/fdfs

  storage:
    image: delron/fastdfs
    command: storage
    environment:
      TRACKER_SERVER: tracker:22122
    depends_on:
      - tracker
    volumes:
      - fdfs_storage:/var/fdfs

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: meiduo-mall-web:latest
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: mysql
      MYSQL_DATABASE: meiduo_mall
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200/
      FDFS_BASE_URL: /
      FDFS_TRACKER_SERVER: tracker:22122
      MEIDUO_EXTRA_HOSTS: www.meiduo.site,meiduo.site,localhost,127.0.0.1
    ports:
      - "${WEB_HOST_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      storage:
        condition: service_started

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: meiduo-mall-nginx:latest
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
      - "${NGINX_ALT_HTTP_PORT:-8080}:8080"
    volumes:
      - fdfs_storage:/var/fdfs:ro
    depends_on:
      - web
      - storage

volumes:
  mysql_data:
  elasticsearch_data:
  fdfs_tracker:
  fdfs_storage:
